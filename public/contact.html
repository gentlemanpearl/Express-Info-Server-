<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Express Info Server</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-top: 16px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      box-sizing: border-box;
    }

    button {
      margin-top: 16px;
      padding: 10px 18px;
      border: none;
      background: #0070f3;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>Contact</h1>

  <p>
    Send us a message (this form will create a new user record via <code>POST /api/users</code>).
  </p>

  <form id="contactForm">
    <label>
      Your name
      <input type="text" name="name" required placeholder="Enter your name" />
    </label>
    <button type="submit">Send</button>
  </form>

  <div id="result" style="margin-top: 16px;"></div>

  <h2>Contact info</h2>
  <p>
    Email: <a href="mailto:hello@example.com">hello@example.com</a><br />
    Phone: +1 (555) 555-5555
  </p>

  <script>
    const form = document.getElementById('contactForm');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const name = formData.get('name');

      result.textContent = 'Sending...';

      try {
        const resp = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });

        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Request failed');

        result.innerHTML = `Added user: <pre>${JSON.stringify(data, null, 2)}</pre>`;
        form.reset();
      } catch (err) {
        result.textContent = err.message;
      }
    });
  </script>
</body>
</html>
